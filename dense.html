<!DOCTYPE html>
<html>
<head>
  <title>8-Ring Dyson Swarm</title>
  <script src="ring.js"></script>
</head>
<body bgcolor="#000000" text="#ffffff" style="font-family:monospace;">

<h3>2 rings with mass orbiting an oblate central sun (or sun plus inner ring)</h3>

<p>The precessing of the rings can be roughly eliminated or reversed by tuning how oblate the sun is. It still has the tag-team orbit behavior so there's still wobbles.

<p><center><canvas id="dense" width="600" height="400" style="border:1px solid #ffffff;"><script>
    document.getElementById("dense").width = window.innerWidth*0.9;
    document.getElementById("dense").height = window.innerWidth*0.3;
(function() {
    var moons = [];
    var colors = ["#ffff00", "#ff00ff","#00ffff", "#ff0000", "#00ff00", "#0000ff", "#ffffff"];
    const baseL = 0.69;
    const baseV = 3.4;
    const baseR = 0.02;
    const shells = 8;
    var nRings = 1;
    for (var j = 1; j <= shells; j++) {
        nRings += 6*j;
    }
    const rm = 1.0/nRings; // ring mass
    moons.push({ y: 0, mass: 0, color: "#ffff00", radius: 1, l: 0, fixed: true });  // sun
    moons.push({ y: 1, mass: rm, color: "#ffff00", radius: 1, l: baseL });  // center
    for (var j = 1; j <= shells; j++)
    {
        var nMoons = 6*j;
        for (var i = 0; i < nMoons; i++) {
            const r = baseR*j;
            const v = baseV;
            const L = baseL;
            const theta = i*2*Math.PI/nMoons;
            const rs = r*Math.sin(theta);
            const rc = r*Math.cos(theta);
            moons.push({ y: 1+rs, z: rc, l: L, vy: -rc*v, vz: rs*v, mass: rm, color: colors[i%7], radius: 1});
        }
    }
    ring(document.currentScript.parentElement, {
        background: "#000000",
        scale: window.innerWidth*0.7,
        ymargin: 20,
        increment: 0.01,
        work: 4,
        framerate: 40,
        trail: true,
        traillen: 1,
        fade: 0.5,
        stop: false,
        moons: moons,
    });
})();
</script></canvas></center>

</body>
</html>
